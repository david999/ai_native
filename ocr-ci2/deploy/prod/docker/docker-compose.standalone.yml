# OCR Gateway only（GitLab 独立部署，如 https://gitlab.aulton.com）。
#
# Aulton 生产（宿主机 172.16.5.119）：
#   运维目录：/aulton/apps/ocr-gateway（本文件 + ocr-gateway-prod.tar 放此目录）
#   宿主机端口 48010 → 容器内 8010（镜像内 uvicorn 固定监听 8010）
#   CI Variable OCR_GATEWAY_URL=http://172.16.5.119:48010
#   Dashboard：http://172.16.5.119:48010/
#
# 运维验收：curl -s http://127.0.0.1:48010/health

services:
  ocr-gateway:
    image: ocr-gateway:prod
    build:
      context: ../../..
      dockerfile: deploy/prod/docker/Dockerfile
    container_name: ocr-gateway
    ports:
      # 宿主机:容器 — 生产对外 48010，容器内仍为 8010
      - "48010:8010"
    volumes:
      - ocr-gateway-work:/var/ocr-gateway/work
      # 可选：持久化 session JSONL，便于 Dashboard / 排障
      # - ocr-gateway-sessions:/root/.opencodereview/sessions
    environment:
      OCR_GATEWAY_SECRET: 9etUwp53i,_MvBV8+ko~zcctbRCftqbK
      OCR_GATEWAY_GITLAB_URL: https://gitlab.aulton.com
      OCR_GATEWAY_GITLAB_API_URL: https://gitlab.aulton.com
      OCR_GATEWAY_GITLAB_PUBLIC_URL: https://gitlab.aulton.com
      OCR_GATEWAY_WORK_ROOT: /var/ocr-gateway/work
      OCR_GATEWAY_MAX_CONCURRENT: "2"
      OCR_REVIEW_CONCURRENCY: "4"
    restart: unless-stopped

volumes:
  ocr-gateway-work:
  # ocr-gateway-sessions:
