# OCR Gateway E2E 场景索引（datacalc-web）
scenarios:
  - id: D01_feature_date_guard
    title: 功能开发 - 换电时间起止顺序校验
    branch: ocr-test/D01_feature_date_guard
    target_branch: master
    min_ocr_notes: 1
    min_inline_comments: 0
    must_find_keywords: []
    keyword_warnings_only: true

  - id: D02_bug_npe_optional
    title: Bug 引入 - Optional.orElse(null) 未校验
    branch: ocr-test/D02_bug_npe_optional
    target_branch: master
    min_ocr_notes: 1
    min_inline_comments: 0
    must_find_keywords:
      - null
    keyword_warnings_only: true

  - id: D03_bug_empty_catch
    title: Bug 引入 - 空 catch 吞异常
    branch: ocr-test/D03_bug_empty_catch
    target_branch: master
    min_ocr_notes: 1
    min_inline_comments: 0
    must_find_keywords:
      - catch
    keyword_warnings_only: true

  - id: D04_bugfix_npe_guard
    title: Bug 修复 - 补 null guard
    branch: ocr-test/D04_bugfix_npe_guard
    target_branch: master
    min_ocr_notes: 1
    min_inline_comments: 0
    must_find_keywords: []
    relax_comment_count: true
    compare_scenario: D02_bug_npe_optional
