# 固定测试场景索引（由 apply_scenario.py 读取）
scenarios:
  - id: S01_clean_refactor
    title: 纯重构（提取方法、重命名）
    branch: aicr-test/S01_clean_refactor
    relax_score: true
    expected_score_min: 75
    expected_score_max: 100
    must_find_keywords: []
    language_hint: Java/Spring

  - id: S02_npe_optional
    title: Optional.orElse(null) 未校验
    branch: aicr-test/S02_npe_optional
    expected_score_min: 0
    expected_score_max: 65
    must_find_keywords:
      - null
      - Optional
    language_hint: Java/Spring

  - id: S03_empty_catch
    title: 空 catch 吞异常
    branch: aicr-test/S03_empty_catch
    expected_score_min: 0
    expected_score_max: 70
    must_find_keywords:
      - catch
      - exception
    language_hint: Java/Spring

  - id: S04_hardcoded_secret
    title: 配置文件明文密钥
    branch: aicr-test/S04_hardcoded_secret
    expected_score_min: 0
    expected_score_max: 50
    must_find_keywords:
      - secret
    language_hint: Java/Spring

  - id: S05_feign_no_timeout
    title: Feign 客户端缺超时
    branch: aicr-test/S05_feign_no_timeout
    expected_score_min: 0
    expected_score_max: 75
    must_find_keywords:
      - Feign
      - timeout
    language_hint: Java/Spring

  - id: S06_incremental
    title: 增量评审二次 commit
    branch: aicr-test/S06_incremental
    incremental_only: true
    # 二次增量 diff 通常仅 1 个 major issue → score ≈ 72（100−28）；原 max 65 过严
    expected_score_min: 0
    expected_score_max: 75
    must_find_keywords:
      - null
    language_hint: Java/Spring
