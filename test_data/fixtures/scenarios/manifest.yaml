  - id: S05_feign_no_timeout
    title: Feign 客户端缺超时
    branch: test/S05_feign_no_timeout
    expected_score_min: 0
    expected_score_max: 75
    must_find_keywords:
      - Feign
      - timeout
    language_hint: Java/Spring
