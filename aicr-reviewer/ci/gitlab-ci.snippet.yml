aicr-review:
  stage: test
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
  # needs:
  #   - job: reviewdog-eslint
  #     optional: true
  script:
    - bash "${CI_PROJECT_DIR}/aicr-reviewer/scripts/ci_review_gate.sh"
  allow_failure: false
