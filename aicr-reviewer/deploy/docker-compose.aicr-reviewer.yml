# Linux 生产：aicr-reviewer
# 用法:
#   cd evn/gitlab
#   docker compose -f docker-compose.yml -f ../../aicr-reviewer/deploy/docker-compose.aicr-reviewer.yml up -d aicr-reviewer
#
# 构建: cd aicr-reviewer && docker build -t gitlab-aicr-reviewer:latest .

services:
  aicr-reviewer:
    image: gitlab-aicr-reviewer:latest
    container_name: aicr-reviewer
    restart: always
    env_file:
      - ../../evn/.env
    environment:
      - GITLAB_URL=http://gitlab:8000
    ports:
      - "8001:8001"
    networks:
      - default

networks:
  default:
    name: gitlab_default
    external: true
